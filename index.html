<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שירילי | מטפלת מוסמכת בשיטת פשיקום®</title>
  <meta name="description" content="שחרור כאבי תנועה כרוניים — בגוף ובנפש יחד." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --lavender:      #E8D5F5;
      --lavender-text: #7B5EA7;
      --mint:          #D5F5E8;
      --mint-text:     #3E8A67;
      --peach:         #F5E8D5;
      --peach-text:    #A07040;
      --bg:            #FEFEFE;
      --text:          #3A3A3A;
      --text-muted:    #6B6B6B;
      --white:         #FFFFFF;
      --nav-h:         60px;
      --shadow:        0 4px 20px rgba(0,0,0,0.08);
      --shadow-lg:     0 8px 36px rgba(0,0,0,0.14);
      --radius:        16px;
      --transition:    0.28s ease;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Assistant', sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
    }
    h1,h2,h3 { line-height: 1.3; font-weight: 700; }
    h2 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    h3 { font-size: clamp(1rem, 2.5vw, 1.3rem); }
    p  { color: var(--text-muted); }
    a  { text-decoration: none; color: inherit; }
    ul { padding-inline-start: 1.4em; }
    li { margin-bottom: 0.5em; color: var(--text-muted); }
    strong { color: var(--text); }

    section { padding: 72px 24px; }
    .container { max-width: 1080px; margin: 0 auto; }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .reveal { opacity:0; transform:translateY(24px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.visible { opacity:1; transform:none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px; border-radius: 50px;
      font-family: 'Assistant', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; border: none;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn:active { transform: translateY(0); }
    .btn-hero  { background: var(--lavender-text); color: var(--white); font-size: 1.05rem; padding: 16px 34px; }
    .btn-wa    { background: #25D366; color: var(--white); }
    .btn-email { background: var(--white); color: var(--peach-text); border: 2px solid rgba(160,112,64,.25); }

    /* ── Section label ── */
    .label {
      display: inline-block; font-size: .78rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 50px; margin-bottom: 12px;
    }
    .label-lav   { background: var(--lavender); color: var(--lavender-text); }
    .label-mint  { background: var(--mint);     color: var(--mint-text);     }
    .label-peach { background: var(--peach);    color: var(--peach-text);    }

    /* ══════════════════════
       NAV
    ══════════════════════ */
    #nav {
      position: sticky; top: 0; z-index: 900;
      height: var(--nav-h);
      background: rgba(254,254,254,.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,.07);
    }
    .nav-inner {
      height: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    #nav-brand {
      font-size: 1.15rem; font-weight: 700; color: var(--lavender-text);
      white-space: nowrap;
    }
    .nav-links {
      display: flex; gap: 4px; align-items: center;
    }
    .nav-links a {
      padding: 6px 14px; border-radius: 50px; font-size: .9rem; font-weight: 600;
      color: var(--text-muted); transition: background var(--transition), color var(--transition);
    }
    .nav-links a:hover { background: var(--lavender); color: var(--lavender-text); }
    #lang-toggle {
      background: var(--lavender); color: var(--lavender-text);
      border: none; border-radius: 50px; padding: 7px 16px;
      font-family: 'Assistant', sans-serif; font-size: .88rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: background var(--transition), transform var(--transition);
    }
    #lang-toggle:hover { background: var(--lavender-text); color: var(--white); transform: scale(1.04); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
    }

    /* ══════════════════════
       HERO
    ══════════════════════ */
    #hero {
      min-height: calc(100svh - var(--nav-h));
      background: linear-gradient(135deg, var(--lavender) 0%, var(--mint) 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; padding: 64px 24px 0;
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(245,232,213,.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(232,213,245,.4) 0%, transparent 70%);
    }
    .hero-content { position:relative; z-index:1; max-width:720px; animation: fadeInUp .9s ease both; }
    #hero-badge {
      display: inline-block; background: rgba(255,255,255,.65);
      backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.8);
      border-radius: 50px; padding: 6px 20px; font-size: .85rem; font-weight: 600;
      color: var(--lavender-text); margin-bottom: 28px; letter-spacing: .06em;
    }
    #hero-title { font-size: clamp(2rem, 6vw, 3.4rem); color: var(--text); margin-bottom: 18px; }
    #hero-title span { color: var(--lavender-text); }
    #hero-subtitle { font-size: clamp(1rem, 2.5vw, 1.2rem); margin-bottom: 40px; }
    .wave-divider { position:absolute; bottom:-1px; left:0; width:100%; line-height:0; }
    .wave-divider svg { width:100%; display:block; }

    /* ══════════════════════
       METHODS
    ══════════════════════ */
    #fashicom { background: var(--bg); }
    .section-header { text-align:center; max-width:640px; margin: 0 auto 52px; }
    .section-header h2 { margin-bottom: 10px; }
    .cards-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:24px; }
    .card {
      border-radius: var(--radius); padding: 30px 26px;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .card:hover { transform:translateY(-4px); box-shadow: var(--shadow-lg); }
    .card-lavender { background: var(--lavender); }
    .card-mint     { background: var(--mint);     }
    .card-peach    { background: var(--peach);    }
    .card-icon {
      width:50px; height:50px; border-radius:14px;
      background: rgba(255,255,255,.55);
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; margin-bottom:16px;
    }
    .card-lavender h3 { color: var(--lavender-text); margin-bottom:8px; }
    .card-mint     h3 { color: var(--mint-text);     margin-bottom:8px; }
    .card-peach    h3 { color: var(--peach-text);    margin-bottom:8px; }

    /* ══════════════════════
       ABOUT
    ══════════════════════ */
    #about { background: linear-gradient(160deg, var(--peach) 0%, var(--lavender) 100%); }
    .about-inner { display:flex; flex-direction:column; align-items:center; gap:40px; }
    @media (min-width:769px) {
      .about-inner { flex-direction:row; align-items:flex-start; }
      .about-photo { flex-shrink:0; }
      .about-text  { flex:1; }
    }
    .avatar-ring {
      width:200px; height:200px; border-radius:50%;
      background: rgba(255,255,255,.6); border: 4px solid rgba(255,255,255,.9);
      box-shadow: var(--shadow-lg);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; color:var(--lavender-text); font-size:.8rem; font-weight:600; text-align:center;
      overflow:hidden;
    }
    .about-text h2 { color:var(--lavender-text); margin-bottom:4px; }
    #about-tagline { font-size:1rem; font-weight:600; color:var(--peach-text); margin-bottom:14px; }
    #about-bio p  { margin-bottom:12px; }
    .credentials  { display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; }
    .cred-tag {
      background: rgba(255,255,255,.65); border: 1px solid rgba(255,255,255,.8);
      border-radius:50px; padding:5px 16px; font-size:.84rem; font-weight:600;
      color:var(--lavender-text);
    }
    @media (max-width:768px) {
      .about-inner { text-align:center; }
      .credentials { justify-content:center; }
    }

    /* ══════════════════════
       ARTICLES
    ══════════════════════ */
    #articles { background: var(--bg); }
    .articles-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:8px; }
    .articles-scroll::-webkit-scrollbar { display:none; }
    .articles-grid {
      display:grid; grid-template-columns: repeat(3, minmax(280px,1fr));
      gap:24px; width:max-content;
    }
    @media (min-width:900px) {
      .articles-scroll { overflow-x:visible; }
      .articles-grid   { width:auto; }
    }
    .article-card {
      background: var(--white); border-radius:var(--radius);
      box-shadow:var(--shadow); overflow:hidden;
      display:flex; flex-direction:column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .article-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
    .article-thumb { height:130px; display:flex; align-items:center; justify-content:center; font-size:2.4rem; }
    .article-thumb-lavender { background:var(--lavender); }
    .article-thumb-mint     { background:var(--mint);     }
    .article-thumb-peach    { background:var(--peach);    }
    .article-body { padding:24px; flex:1; display:flex; flex-direction:column; }
    .article-body h3 { margin-bottom:8px; color:var(--text); }
    .article-meta { font-size:.8rem; font-weight:600; color:var(--text-muted); margin-bottom:10px; letter-spacing:.04em; }
    .article-body p  { font-size:.92rem; flex:1; }
    .btn-read-more {
      margin-top:18px; align-self:flex-start;
      background:var(--lavender); color:var(--lavender-text);
      border:none; border-radius:50px; padding:9px 20px;
      font-family:'Assistant',sans-serif; font-size:.9rem; font-weight:700;
      cursor:pointer; transition: background var(--transition), transform var(--transition);
    }
    .btn-read-more:hover { background:var(--lavender-text); color:var(--white); transform:translateY(-1px); }

    /* ══════════════════════
       CONTACT
    ══════════════════════ */
    #contact { background:var(--peach); text-align:center; }
    .contact-inner { max-width:520px; margin:0 auto; }
    .contact-inner h2 { color:var(--peach-text); margin-bottom:10px; }
    .contact-inner > p { margin-bottom:38px; }
    .contact-btns { display:flex; flex-direction:column; gap:16px; align-items:center; }
    @media (min-width:480px) { .contact-btns { flex-direction:row; justify-content:center; } }

    /* ══════════════════════
       FOOTER
    ══════════════════════ */
    footer {
      background:var(--text); color:rgba(255,255,255,.72);
      text-align:center; padding:28px 24px; font-size:.88rem;
    }
    #footer-name { font-size:1rem; font-weight:700; color:var(--white); margin-bottom:4px; }

    /* ══════════════════════
       FLOATING WA
    ══════════════════════ */
    #wa-float {
      position:fixed; bottom:28px; left:28px; z-index:1000;
      width:60px; height:60px; border-radius:50%;
      background:#25D366; color:var(--white);
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 6px 24px rgba(37,211,102,.45);
      animation: fadeInUp 1.2s ease both;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    #wa-float:hover { transform:scale(1.1); box-shadow:0 10px 32px rgba(37,211,102,.55); }
    #wa-float svg { width:32px; height:32px; fill:var(--white); }
    #wa-float::after {
      content:''; position:absolute; inset:-6px; border-radius:50%;
      border:2px solid rgba(37,211,102,.4);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform:scale(.95); opacity:.7; }
      70%  { transform:scale(1.15); opacity:0; }
      100% { transform:scale(1.15); opacity:0; }
    }

    /* ══════════════════════
       ARTICLE MODAL
    ══════════════════════ */
    dialog {
      max-width:700px; width:90vw; max-height:88vh;
      overflow-y:auto; border:none;
      border-radius:20px; padding:0;
      box-shadow:0 20px 60px rgba(0,0,0,.22);
    }
    dialog::backdrop { background:rgba(0,0,0,.48); backdrop-filter:blur(4px); }
    .modal-header {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:32px 36px 20px; border-bottom:1px solid rgba(0,0,0,.07);
      position:sticky; top:0; background:var(--white); z-index:1;
    }
    #modal-title { font-size:clamp(1.1rem,3vw,1.5rem); color:var(--text); }
    #modal-date  { font-size:.8rem; font-weight:600; color:var(--text-muted); letter-spacing:.06em; margin-bottom:6px; }
    .modal-close-btn {
      background:none; border:none; cursor:pointer; font-size:1.3rem;
      color:var(--text-muted); padding:4px 8px; line-height:1;
      transition:color var(--transition);
      flex-shrink:0; margin-inline-start:16px;
    }
    .modal-close-btn:hover { color:var(--text); }
    #modal-content {
      padding:28px 36px;
      font-size:1rem; line-height:1.8;
    }
    #modal-content h3 { font-size:1.15rem; color:var(--lavender-text); margin:24px 0 10px; }
    #modal-content p  { margin-bottom:16px; color:var(--text-muted); }
    #modal-content ul { margin-bottom:16px; }
    #modal-content li { margin-bottom:8px; }
    #modal-content strong { color:var(--text); }
    #modal-content em { color:var(--lavender-text); font-style:normal; font-weight:600; }
    .modal-footer {
      padding:20px 36px 28px; display:flex; justify-content:flex-end;
      border-top:1px solid rgba(0,0,0,.07);
    }
    .btn-modal-close {
      background:var(--lavender); color:var(--lavender-text);
      border:none; border-radius:50px; padding:10px 24px;
      font-family:'Assistant',sans-serif; font-size:.95rem; font-weight:700;
      cursor:pointer; transition:background var(--transition);
    }
    .btn-modal-close:hover { background:var(--lavender-text); color:var(--white); }

    @media (max-width:768px) {
      section { padding:56px 20px; }
      .modal-header, #modal-content, .modal-footer { padding-inline:22px; }
      .modal-header { padding-top:24px; }
      .modal-footer { padding-bottom:24px; }
      #wa-float { bottom:20px; left:20px; width:54px; height:54px; }
    }
  </style>
</head>
<body>

  <!-- Floating WhatsApp -->
  <a id="wa-float" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <!-- Nav -->
  <nav id="nav">
    <div class="nav-inner container">
      <span id="nav-brand"></span>
      <div class="nav-links">
        <a id="nav-methods" href="#fashicom"></a>
        <a id="nav-about"   href="#about"></a>
        <a id="nav-articles" href="#articles"></a>
        <a id="nav-contact" href="#contact"></a>
      </div>
      <button id="lang-toggle" onclick="toggleLang()"></button>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <div class="hero-content">
      <div id="hero-badge"></div>
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle" class="subtitle"></p>
      <a id="hero-cta" class="btn btn-hero" href="#contact"></a>
    </div>
    <div class="wave-divider">
      <svg viewBox="0 0 1440 64" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,32 C240,64 480,0 720,32 C960,64 1200,0 1440,32 L1440,64 L0,64 Z" fill="#FEFEFE"/>
      </svg>
    </div>
  </section>

  <!-- Methods -->
  <section id="fashicom">
    <div class="container">
      <div class="section-header reveal">
        <span id="methods-label" class="label label-lav"></span>
        <h2 id="methods-heading"></h2>
        <p id="methods-intro"></p>
      </div>
      <div id="methods-cards" class="cards-grid"></div>
    </div>
  </section>

  <!-- About -->
  <section id="about">
    <div class="container">
      <div class="about-inner">
        <div class="about-photo reveal">
          <div class="avatar-ring">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" aria-hidden="true">
              <circle cx="32" cy="22" r="14" fill="#C9A7E6" opacity=".7"/>
              <ellipse cx="32" cy="52" rx="22" ry="14" fill="#C9A7E6" opacity=".5"/>
            </svg>
            <span id="about-photo-label"></span>
          </div>
        </div>
        <div class="about-text reveal">
          <span id="about-label" class="label label-peach"></span>
          <h2 id="about-heading"></h2>
          <p id="about-tagline"></p>
          <div id="about-bio"></div>
          <div id="about-credentials" class="credentials"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Articles -->
  <section id="articles">
    <div class="container">
      <div class="section-header reveal">
        <span id="articles-label" class="label label-mint"></span>
        <h2 id="articles-heading"></h2>
        <p id="articles-intro"></p>
      </div>
      <div class="articles-scroll reveal">
        <div id="articles-grid" class="articles-grid"></div>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact">
    <div class="container">
      <div class="contact-inner reveal">
        <span id="contact-label" class="label label-peach"></span>
        <h2 id="contact-heading"></h2>
        <p id="contact-intro"></p>
        <div class="contact-btns">
          <a id="wa-btn"    class="btn btn-wa"    target="_blank" rel="noopener"></a>
          <a id="email-btn" class="btn btn-email" href="mailto:SHIRLY_EMAIL_PLACEHOLDER"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div id="footer-name"></div>
    <p id="footer-copy"></p>
  </footer>

  <!-- Article Modal -->
  <dialog id="article-modal">
    <div class="modal-header">
      <div>
        <p id="modal-date"></p>
        <h2 id="modal-title"></h2>
      </div>
      <button class="modal-close-btn" onclick="closeModal()" aria-label="close">✕</button>
    </div>
    <div id="modal-content"></div>
    <div class="modal-footer">
      <button id="modal-close-text" class="btn-modal-close" onclick="closeModal()"></button>
    </div>
  </dialog>

  <script>
    const WA = '972522915130';
    const EMAIL = 'SHIRLY_EMAIL_PLACEHOLDER';

    let lang = 'he';
    let C = null;

    /* ── Bootstrap ── */
    async function init() {
      const res = await fetch('./content.json');
      C = await res.json();
      const saved = localStorage.getItem('fashicom-lang');
      const browser = navigator.language?.startsWith('he') ? 'he' : 'en';
      lang = saved || browser;
      render();
      setupObserver();
    }

    function render() {
      const L = C[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.title = L.meta.title;

      /* nav */
      set('nav-brand',    L.nav.brand);
      set('nav-methods',  L.nav.methods);
      set('nav-about',    L.nav.about);
      set('nav-articles', L.nav.articles);
      set('nav-contact',  L.nav.contact);
      set('lang-toggle',  L.lang_toggle);

      /* hero */
      set('hero-badge',    L.hero.badge);
      setHTML('hero-title', L.hero.title);
      set('hero-subtitle', L.hero.subtitle);
      setHTML('hero-cta',  waIcon() + L.hero.cta);
      attr('hero-cta', 'href', '#contact');

      /* methods */
      set('methods-label',   L.methods.label);
      set('methods-heading', L.methods.heading);
      set('methods-intro',   L.methods.intro);
      renderMethodCards(L.methods.cards);

      /* about */
      set('about-label',       L.about.label);
      set('about-heading',     L.about.heading);
      set('about-tagline',     L.about.tagline);
      set('about-photo-label', L.about.photo_placeholder);
      renderBio(L.about.bio);
      renderCredentials(L.about.credentials);

      /* articles */
      set('articles-label',   L.articles_section.label);
      set('articles-heading', L.articles_section.heading);
      set('articles-intro',   L.articles_section.intro);
      renderArticles(L.articles_section);

      /* contact */
      set('contact-label',   L.contact.label);
      set('contact-heading', L.contact.heading);
      set('contact-intro',   L.contact.intro);
      setHTML('wa-btn',    waIcon() + L.contact.wa_text);
      attr('wa-btn',  'href', waLink(L.contact.wa_message));
      setHTML('email-btn', emailIcon() + L.contact.email_text);
      attr('email-btn', 'href', 'mailto:' + EMAIL);

      /* footer */
      set('footer-name', L.footer.name);
      set('footer-copy', '© ' + new Date().getFullYear() + ' | ' + L.footer.copy);

      /* floating */
      attr('wa-float', 'href', waLink(L.contact.wa_message));
      attr('wa-float', 'aria-label', L.wa_float_aria);
    }

    /* ── Render helpers ── */
    function renderMethodCards(cards) {
      document.getElementById('methods-cards').innerHTML = cards.map(c => `
        <div class="card card-${c.color} reveal">
          <div class="card-icon">${c.icon}</div>
          <h3>${c.title}</h3>
          <p>${c.body}</p>
        </div>`).join('');
    }

    function renderBio(paras) {
      document.getElementById('about-bio').innerHTML = paras.map(p => `<p>${p}</p>`).join('');
    }

    function renderCredentials(creds) {
      document.getElementById('about-credentials').innerHTML =
        creds.map(c => `<span class="cred-tag">${c}</span>`).join('');
    }

    function renderArticles(LS) {
      document.getElementById('articles-grid').innerHTML = C.articles.map(a => {
        const d = a[lang];
        return `
          <div class="article-card">
            <div class="article-thumb article-thumb-${a.color}">${a.icon}</div>
            <div class="article-body">
              <p class="article-meta">${d.date}</p>
              <h3>${d.title}</h3>
              <p>${d.summary}</p>
              <button class="btn-read-more" onclick="openArticle('${a.id}')">${LS.read_more} →</button>
            </div>
          </div>`;
      }).join('');
    }

    /* ── Language toggle ── */
    function toggleLang() {
      lang = lang === 'he' ? 'en' : 'he';
      localStorage.setItem('fashicom-lang', lang);
      render();
      setupObserver();
    }

    /* ── Article modal ── */
    function openArticle(id) {
      const a = C.articles.find(x => x.id === id);
      const d = a[lang];
      const LS = C[lang];
      set('modal-date',  d.date);
      set('modal-title', d.title);
      setHTML('modal-content', d.content);
      set('modal-close-text', LS.articles_section.close);
      const dlg = document.getElementById('article-modal');
      dlg.scrollTop = 0;
      dlg.showModal();
    }

    function closeModal() {
      document.getElementById('article-modal').close();
    }

    /* Close on backdrop click */
    document.getElementById('article-modal').addEventListener('click', e => {
      const r = e.currentTarget.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right ||
          e.clientY < r.top  || e.clientY > r.bottom) closeModal();
    });

    /* ── Intersection observer for reveal ── */
    let observer;
    function setupObserver() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver(
        entries => entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
        }),
        { threshold: 0.1 }
      );
      document.querySelectorAll('.reveal').forEach(el => {
        el.classList.remove('visible');
        observer.observe(el);
      });
    }

    /* ── Tiny DOM helpers ── */
    function set(id, txt)          { const el = document.getElementById(id); if (el) el.textContent = txt; }
    function setHTML(id, html)     { const el = document.getElementById(id); if (el) el.innerHTML = html; }
    function attr(id, name, val)   { const el = document.getElementById(id); if (el) el.setAttribute(name, val); }

    /* ── Icon strings ── */
    function waIcon() {
      return `<svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="flex-shrink:0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
    }

    function emailIcon() {
      return `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
    }

    function waLink(msg) {
      return 'https://wa.me/' + WA + '?text=' + encodeURIComponent(msg);
    }

    init();
  </script>
</body>
</html>
