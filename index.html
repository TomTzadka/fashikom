<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שירילי | מטפלת מוסמכת בשיטת פשיקום®</title>
  <meta name="description" content="שחרור כאבי תנועה כרוניים — בגוף ובנפש יחד." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Palette ── */
    :root {
      --p900: #1A0836;
      --p800: #2D1654;
      --p700: #3D2070;
      --p600: #5B30A6;
      --p500: #7B5EA7;
      --p400: #9D7EC8;
      --p300: #BBA2DF;
      --p200: #D4B8EE;
      --p150: #E2CBF5;
      --p100: #EDD9F9;
      --p50:  #F7F0FE;
      --bg:   #FEFEFE;
      --text:       #1E1035;
      --text-muted: #5D4E75;
      --white:      #FFFFFF;
      --nav-h:      62px;
      --shadow:     0 4px 24px rgba(91,48,166,.09);
      --shadow-lg:  0 12px 44px rgba(91,48,166,.18);
      --radius:     18px;
      --t:          0.26s ease;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Assistant', sans-serif;
      font-size: 17px; line-height: 1.75;
      color: var(--text); background: var(--bg);
    }
    body.no-scroll { overflow: hidden; }
    h1,h2,h3 { line-height: 1.25; font-weight: 700; color: var(--text); }
    h2 { font-size: clamp(1.6rem, 4vw, 2.3rem); }
    h3 { font-size: clamp(1.05rem, 2.5vw, 1.25rem); }
    p  { color: var(--text-muted); }
    a  { text-decoration: none; color: inherit; }
    ul { padding-inline-start: 1.4em; }
    li { margin-bottom: .5em; color: var(--text-muted); }
    strong { color: var(--text); }
    section { padding: 80px 24px; }
    .container { max-width: 1080px; margin: 0 auto; }

    /* ── Reveal animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .65s ease, transform .65s ease;
      transition-delay: var(--delay, 0ms);
    }
    .reveal.visible { opacity: 1; transform: none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 13px 28px; border-radius: 50px;
      font-family: 'Assistant', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; border: none;
      transition: transform var(--t), box-shadow var(--t), background var(--t);
    }
    .btn:hover  { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .btn:active { transform: translateY(-1px); }

    .btn-hero {
      background: var(--white); color: var(--p600);
      font-size: 1.05rem; padding: 16px 36px;
    }
    .btn-hero:hover { background: var(--p50); }

    .btn-wa    { background: #25D366; color: var(--white); }
    .btn-wa:hover { background: #1fbc5a; }

    .btn-email {
      background: rgba(255,255,255,.15); color: var(--white);
      border: 1.5px solid rgba(255,255,255,.4);
    }
    .btn-email:hover { background: rgba(255,255,255,.25); }

    /* ── Labels ── */
    .label {
      display: inline-block; font-size: .75rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      padding: 5px 16px; border-radius: 50px; margin-bottom: 14px;
    }
    .label-lav   { background: var(--p100); color: var(--p600); }
    .label-mint  { background: var(--p150); color: var(--p700); }
    .label-peach { background: var(--p100); color: var(--p500); }

    /* ══════════════════════════
       NAV
    ══════════════════════════ */
    #nav {
      position: sticky; top: 0; z-index: 900;
      height: var(--nav-h);
      background: rgba(254,254,254,.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--p100);
    }
    .nav-inner {
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    #nav-brand {
      font-size: 1.15rem; font-weight: 700;
      color: var(--p600); white-space: nowrap;
      letter-spacing: .01em;
    }
    .nav-links {
      display: flex; gap: 2px; align-items: center; flex: 1;
      justify-content: center;
    }
    .nav-links a {
      padding: 7px 15px; border-radius: 50px;
      font-size: .92rem; font-weight: 600; color: var(--text-muted);
      transition: background var(--t), color var(--t);
      white-space: nowrap;
    }
    .nav-links a:hover { background: var(--p50); color: var(--p600); }
    .nav-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    #lang-toggle {
      background: var(--p50); color: var(--p600); border: 1.5px solid var(--p200);
      border-radius: 50px; padding: 7px 16px;
      font-family: 'Assistant', sans-serif; font-size: .88rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: background var(--t), color var(--t), border-color var(--t);
    }
    #lang-toggle:hover { background: var(--p600); color: var(--white); border-color: var(--p600); }

    /* Hamburger */
    .hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; background: none; border: none; cursor: pointer;
      padding: 6px; width: 38px; height: 38px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--p700); border-radius: 2px;
      transition: all .22s ease; transform-origin: center;
    }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile dropdown menu */
    .mobile-menu {
      display: none;
      position: absolute; top: var(--nav-h); inset-inline: 0;
      background: var(--white);
      border-bottom: 1px solid var(--p100);
      box-shadow: 0 12px 36px rgba(91,48,166,.14);
      padding: 10px 16px 18px;
      z-index: 899;
      animation: fadeUp .22s ease both;
    }
    .mobile-menu.open { display: block; }
    .mobile-menu a {
      display: block; padding: 13px 18px;
      border-radius: 12px; font-size: 1.05rem; font-weight: 600;
      color: var(--p700); transition: background var(--t);
    }
    .mobile-menu a:hover { background: var(--p50); }
    .mob-divider { height: 1px; background: var(--p100); margin: 6px 0; }

    @media (max-width: 680px) {
      .hamburger { display: flex; }
      .nav-links  { display: none; }
      #lang-toggle { font-size: .82rem; padding: 6px 13px; }
    }

    /* ══════════════════════════
       HERO
    ══════════════════════════ */
    #hero {
      min-height: calc(100svh - var(--nav-h));
      background: linear-gradient(145deg, var(--p900) 0%, var(--p700) 45%, var(--p500) 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; padding: 72px 24px 0;
      position: relative; overflow: hidden;
    }
    /* Subtle radial glow */
    #hero::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 30% 40%, rgba(155,120,220,.35) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 75% 70%, rgba(91,48,166,.25) 0%, transparent 65%);
    }
    /* Decorative circles */
    #hero::after {
      content: '';
      position: absolute; top: -120px; inset-inline-end: -80px;
      width: 480px; height: 480px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.07);
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 1; max-width: 740px; }
    .hero-content > * { animation: fadeUp .8s ease both; }
    .hero-content > *:nth-child(2) { animation-delay: .1s; }
    .hero-content > *:nth-child(3) { animation-delay: .2s; }
    .hero-content > *:nth-child(4) { animation-delay: .32s; }

    #hero-badge {
      display: inline-block;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 50px; padding: 7px 22px;
      font-size: .83rem; font-weight: 700; letter-spacing: .09em;
      color: rgba(255,255,255,.88); margin-bottom: 28px;
    }
    #hero-title {
      font-size: clamp(2.2rem, 6.5vw, 3.8rem);
      color: var(--white); margin-bottom: 18px;
    }
    #hero-title span { color: var(--p300); }
    #hero-subtitle { font-size: clamp(1rem, 2.5vw, 1.22rem); color: rgba(255,255,255,.78); margin-bottom: 44px; }

    .wave-divider { position: absolute; bottom: -1px; left: 0; width: 100%; line-height: 0; }
    .wave-divider svg { width: 100%; display: block; }

    /* ══════════════════════════
       METHODS
    ══════════════════════════ */
    #fashicom { background: var(--bg); }

    .section-header { text-align: center; max-width: 620px; margin: 0 auto 56px; }
    .section-header h2 { margin-bottom: 12px; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(265px, 1fr)); gap: 24px; }

    .card {
      background: var(--white); border-radius: var(--radius);
      padding: 32px 28px; box-shadow: var(--shadow);
      border-top: 3px solid;
      transition: transform var(--t), box-shadow var(--t);
    }
    .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .card-lavender { border-color: var(--p600); }
    .card-mint     { border-color: var(--p400); }
    .card-peach    { border-color: var(--p300); }
    .card-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--p100);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 18px;
    }
    .card-lavender h3 { color: var(--p600); margin-bottom: 8px; }
    .card-mint     h3 { color: var(--p500); margin-bottom: 8px; }
    .card-peach    h3 { color: var(--p400); margin-bottom: 8px; }

    /* ══════════════════════════
       ABOUT
    ══════════════════════════ */
    #about { background: var(--p50); }

    .about-inner { display: flex; flex-direction: column; align-items: center; gap: 48px; }
    @media (min-width: 769px) {
      .about-inner { flex-direction: row; align-items: flex-start; }
      .about-photo { flex-shrink: 0; }
      .about-text  { flex: 1; }
    }

    .avatar-img {
      width: 220px; height: 220px; border-radius: 50%;
      object-fit: cover; object-position: center top;
      border: 5px solid var(--white);
      box-shadow: var(--shadow-lg);
      display: block;
      transition: transform var(--t);
    }
    .about-photo:hover .avatar-img { transform: scale(1.03); }

    .about-text h2 { color: var(--p700); margin-bottom: 6px; }
    #about-tagline { font-size: 1rem; font-weight: 600; color: var(--p500); margin-bottom: 16px; }
    #about-bio p   { margin-bottom: 13px; }
    .credentials   { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    .cred-tag {
      background: var(--white); border: 1.5px solid var(--p200);
      border-radius: 50px; padding: 5px 16px;
      font-size: .84rem; font-weight: 700; color: var(--p600);
    }
    @media (max-width: 768px) {
      .about-inner { text-align: center; }
      .credentials { justify-content: center; }
    }

    /* ══════════════════════════
       ARTICLES
    ══════════════════════════ */
    #articles { background: var(--bg); }

    .articles-scroll {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 8px;
    }
    .articles-scroll::-webkit-scrollbar { display: none; }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(285px, 1fr));
      gap: 24px; width: max-content;
    }
    @media (min-width: 960px) {
      .articles-scroll { overflow-x: visible; }
      .articles-grid   { width: auto; }
    }

    .article-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform var(--t), box-shadow var(--t);
    }
    .article-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }

    .article-thumb {
      height: 130px; display: flex;
      align-items: center; justify-content: center; font-size: 2.4rem;
    }
    .article-thumb-lavender { background: linear-gradient(135deg, var(--p100) 0%, var(--p200) 100%); }
    .article-thumb-mint     { background: linear-gradient(135deg, var(--p200) 0%, var(--p300) 100%); }
    .article-thumb-peach    { background: linear-gradient(135deg, var(--p100) 0%, var(--p150) 100%); }

    .article-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .article-body h3 { margin-bottom: 8px; color: var(--p700); font-size: 1.05rem; }
    .article-meta { font-size: .78rem; font-weight: 700; color: var(--p400); letter-spacing: .05em; margin-bottom: 10px; text-transform: uppercase; }
    .article-body p { font-size: .92rem; flex: 1; }

    .btn-read-more {
      margin-top: 18px; align-self: flex-start;
      background: var(--p50); color: var(--p600); border: 1.5px solid var(--p200);
      border-radius: 50px; padding: 9px 20px;
      font-family: 'Assistant', sans-serif; font-size: .9rem; font-weight: 700;
      cursor: pointer;
      transition: background var(--t), color var(--t), border-color var(--t), transform var(--t);
    }
    .btn-read-more:hover {
      background: var(--p600); color: var(--white);
      border-color: var(--p600); transform: translateY(-1px);
    }

    /* ══════════════════════════
       CONTACT
    ══════════════════════════ */
    #contact {
      background: linear-gradient(145deg, var(--p800) 0%, var(--p600) 100%);
      text-align: center;
    }
    .contact-inner { max-width: 520px; margin: 0 auto; }
    .contact-inner h2 { color: var(--white); margin-bottom: 12px; }
    .contact-inner > p { color: rgba(255,255,255,.78); margin-bottom: 40px; }
    .contact-btns { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    @media (min-width: 480px) { .contact-btns { flex-direction: row; justify-content: center; } }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    footer {
      background: var(--p900); color: rgba(255,255,255,.6);
      text-align: center; padding: 30px 24px; font-size: .88rem;
    }
    #footer-name { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,.9); margin-bottom: 4px; }

    /* ══════════════════════════
       FLOATING WA
    ══════════════════════════ */
    #wa-float {
      position: fixed; bottom: 28px; left: 28px; z-index: 1000;
      width: 58px; height: 58px; border-radius: 50%;
      background: #25D366; color: var(--white);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(37,211,102,.45);
      animation: fadeUp 1.2s ease both;
      transition: transform var(--t), box-shadow var(--t);
    }
    #wa-float:hover { transform: scale(1.12); box-shadow: 0 10px 36px rgba(37,211,102,.55); }
    #wa-float svg { width: 30px; height: 30px; fill: var(--white); }
    #wa-float::after {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid rgba(37,211,102,.38);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(.95); opacity: .7; }
      70%  { transform: scale(1.16); opacity: 0; }
      100% { transform: scale(1.16); opacity: 0; }
    }

    /* ══════════════════════════
       ARTICLE MODAL
    ══════════════════════════ */
    dialog {
      max-width: 700px; width: 92vw; max-height: 88vh;
      overflow-y: auto; border: none;
      border-radius: 22px; padding: 0;
      box-shadow: 0 24px 72px rgba(29,8,54,.28);
    }
    dialog::backdrop { background: rgba(26,8,54,.52); backdrop-filter: blur(5px); }
    dialog[open] { animation: fadeUp .28s ease both; }

    .modal-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 32px 36px 20px;
      border-bottom: 1px solid var(--p100);
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    #modal-title { font-size: clamp(1.1rem, 3vw, 1.5rem); color: var(--p700); }
    #modal-date  { font-size: .75rem; font-weight: 700; color: var(--p400); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 7px; }
    .modal-close-btn {
      background: var(--p50); border: 1.5px solid var(--p200); border-radius: 50%;
      width: 36px; height: 36px; cursor: pointer; font-size: 1rem;
      color: var(--p500); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-inline-start: 16px;
      transition: background var(--t), color var(--t);
    }
    .modal-close-btn:hover { background: var(--p600); color: var(--white); border-color: var(--p600); }

    #modal-content { padding: 28px 36px; font-size: 1rem; line-height: 1.82; }
    #modal-content h3 { font-size: 1.12rem; color: var(--p600); margin: 26px 0 10px; }
    #modal-content p  { margin-bottom: 16px; color: var(--text-muted); }
    #modal-content ul { margin-bottom: 16px; }
    #modal-content li { margin-bottom: 8px; }
    #modal-content strong { color: var(--text); }
    #modal-content em { color: var(--p600); font-style: normal; font-weight: 600; }

    .modal-footer {
      padding: 18px 36px 28px; display: flex; justify-content: flex-end;
      border-top: 1px solid var(--p100);
    }
    .btn-modal-close {
      background: var(--p600); color: var(--white);
      border: none; border-radius: 50px; padding: 10px 26px;
      font-family: 'Assistant', sans-serif; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: background var(--t), transform var(--t);
    }
    .btn-modal-close:hover { background: var(--p700); transform: translateY(-1px); }

    @media (max-width: 768px) {
      section { padding: 60px 20px; }
      .modal-header, #modal-content, .modal-footer { padding-inline: 22px; }
      .modal-header { padding-top: 24px; }
      .modal-footer { padding-bottom: 22px; }
      #wa-float { bottom: 20px; left: 20px; width: 52px; height: 52px; }
    }
  </style>
</head>
<body>

  <!-- Floating WhatsApp -->
  <a id="wa-float" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <!-- Nav -->
  <nav id="nav">
    <div class="nav-inner container">
      <span id="nav-brand"></span>
      <div class="nav-links">
        <a id="nav-methods"  href="#fashicom"></a>
        <a id="nav-about"    href="#about"></a>
        <a id="nav-articles" href="#articles"></a>
        <a id="nav-contact"  href="#contact"></a>
      </div>
      <div class="nav-actions">
        <button id="lang-toggle" onclick="toggleLang()"></button>
        <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="תפריט">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu">
      <a id="mob-methods"  href="#fashicom" onclick="closeMenu()"></a>
      <a id="mob-about"    href="#about"    onclick="closeMenu()"></a>
      <a id="mob-articles" href="#articles" onclick="closeMenu()"></a>
      <div class="mob-divider"></div>
      <a id="mob-contact"  href="#contact"  onclick="closeMenu()"></a>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <div class="hero-content">
      <div id="hero-badge"></div>
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle"></p>
      <a id="hero-cta" class="btn btn-hero" href="#contact"></a>
    </div>
    <div class="wave-divider">
      <svg viewBox="0 0 1440 70" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,35 C360,70 720,0 1080,35 C1260,52 1380,28 1440,35 L1440,70 L0,70 Z" fill="#FEFEFE"/>
      </svg>
    </div>
  </section>

  <!-- Methods -->
  <section id="fashicom">
    <div class="container">
      <div class="section-header reveal">
        <span id="methods-label" class="label label-lav"></span>
        <h2 id="methods-heading"></h2>
        <p id="methods-intro"></p>
      </div>
      <div id="methods-cards" class="cards-grid"></div>
    </div>
  </section>

  <!-- About -->
  <section id="about">
    <div class="container">
      <div class="about-inner">
        <div class="about-photo reveal">
          <img id="about-photo" src="./src/shirili_main_photo.png" alt="" class="avatar-img" />
        </div>
        <div class="about-text reveal" style="--delay:120ms">
          <span id="about-label" class="label label-peach"></span>
          <h2 id="about-heading"></h2>
          <p id="about-tagline"></p>
          <div id="about-bio"></div>
          <div id="about-credentials" class="credentials"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Articles -->
  <section id="articles">
    <div class="container">
      <div class="section-header reveal">
        <span id="articles-label" class="label label-mint"></span>
        <h2 id="articles-heading"></h2>
        <p id="articles-intro"></p>
      </div>
      <div class="articles-scroll reveal" style="--delay:80ms">
        <div id="articles-grid" class="articles-grid"></div>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact">
    <div class="container">
      <div class="contact-inner reveal">
        <span id="contact-label" class="label label-lav" style="background:rgba(255,255,255,.15);color:rgba(255,255,255,.88)"></span>
        <h2 id="contact-heading"></h2>
        <p id="contact-intro"></p>
        <div class="contact-btns">
          <a id="wa-btn"    class="btn btn-wa"    target="_blank" rel="noopener"></a>
          <a id="email-btn" class="btn btn-email" href="mailto:SHIRLY_EMAIL_PLACEHOLDER"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div id="footer-name"></div>
    <p id="footer-copy"></p>
  </footer>

  <!-- Article Modal -->
  <dialog id="article-modal">
    <div class="modal-header">
      <div>
        <p id="modal-date"></p>
        <h2 id="modal-title"></h2>
      </div>
      <button class="modal-close-btn" onclick="closeModal()" aria-label="close">✕</button>
    </div>
    <div id="modal-content"></div>
    <div class="modal-footer">
      <button id="modal-close-text" class="btn-modal-close" onclick="closeModal()"></button>
    </div>
  </dialog>

  <script>
    const WA    = '972522915130';
    const EMAIL = 'SHIRLY_EMAIL_PLACEHOLDER';

    let lang     = 'he';
    let C        = null;
    let menuOpen = false;

    /* ── Bootstrap ── */
    async function init() {
      const res = await fetch('./content.json');
      C = await res.json();
      const saved   = localStorage.getItem('fashicom-lang');
      const browser = navigator.language?.startsWith('he') ? 'he' : 'en';
      lang = saved || browser;
      render();
      setupObserver();
    }

    /* ── Render ── */
    function render() {
      const L = C[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir  = lang === 'he' ? 'rtl' : 'ltr';
      document.title = L.meta.title;

      /* nav — desktop */
      set('nav-brand',     L.nav.brand);
      set('nav-methods',   L.nav.methods);
      set('nav-about',     L.nav.about);
      set('nav-articles',  L.nav.articles);
      set('nav-contact',   L.nav.contact);
      /* nav — mobile */
      set('mob-methods',   L.nav.methods);
      set('mob-about',     L.nav.about);
      set('mob-articles',  L.nav.articles);
      set('mob-contact',   L.nav.contact);
      set('lang-toggle',   L.lang_toggle);

      /* hero */
      set('hero-badge',    L.hero.badge);
      html('hero-title',   L.hero.title);
      set('hero-subtitle', L.hero.subtitle);
      html('hero-cta',     waIcon() + L.hero.cta);
      attr('hero-cta',     'href', '#contact');

      /* methods */
      set('methods-label',   L.methods.label);
      set('methods-heading', L.methods.heading);
      set('methods-intro',   L.methods.intro);
      renderCards(L.methods.cards);

      /* about */
      set('about-label',   L.about.label);
      set('about-heading', L.about.heading);
      set('about-tagline', L.about.tagline);
      attr('about-photo',  'alt', L.about.photo_alt);
      html('about-bio',    L.about.bio.map(p => `<p>${p}</p>`).join(''));
      html('about-credentials', L.about.credentials.map(c => `<span class="cred-tag">${c}</span>`).join(''));

      /* articles */
      set('articles-label',   L.articles_section.label);
      set('articles-heading', L.articles_section.heading);
      set('articles-intro',   L.articles_section.intro);
      renderArticles(L.articles_section);

      /* contact */
      set('contact-label',   L.contact.label);
      set('contact-heading', L.contact.heading);
      set('contact-intro',   L.contact.intro);
      html('wa-btn',         waIcon() + L.contact.wa_text);
      attr('wa-btn',         'href', waLink(L.contact.wa_message));
      html('email-btn',      emailIcon() + L.contact.email_text);

      /* footer */
      set('footer-name', L.footer.name);
      set('footer-copy', '© ' + new Date().getFullYear() + ' · ' + L.footer.copy);

      /* floating */
      attr('wa-float', 'href',       waLink(L.contact.wa_message));
      attr('wa-float', 'aria-label', L.wa_float_aria);
    }

    /* ── Card renders ── */
    function renderCards(cards) {
      document.getElementById('methods-cards').innerHTML = cards.map((c, i) => `
        <div class="card card-${c.color} reveal" style="--delay:${i * 110}ms">
          <div class="card-icon">${c.icon}</div>
          <h3>${c.title}</h3>
          <p>${c.body}</p>
        </div>`).join('');
    }

    function renderArticles(LS) {
      document.getElementById('articles-grid').innerHTML = C.articles.map((a, i) => {
        const d = a[lang];
        return `
          <div class="article-card reveal" style="--delay:${i * 120}ms">
            <div class="article-thumb article-thumb-${a.color}">${a.icon}</div>
            <div class="article-body">
              <p class="article-meta">${d.date}</p>
              <h3>${d.title}</h3>
              <p>${d.summary}</p>
              <button class="btn-read-more" onclick="openArticle('${a.id}')">${LS.read_more} →</button>
            </div>
          </div>`;
      }).join('');
    }

    /* ── Language toggle ── */
    function toggleLang() {
      lang = lang === 'he' ? 'en' : 'he';
      localStorage.setItem('fashicom-lang', lang);
      if (menuOpen) closeMenu();
      render();
      setupObserver();
    }

    /* ── Mobile menu ── */
    function toggleMenu() {
      menuOpen ? closeMenu() : openMenu();
    }
    function openMenu() {
      menuOpen = true;
      document.getElementById('mobile-menu').classList.add('open');
      document.getElementById('hamburger').classList.add('active');
      document.body.classList.add('no-scroll');
    }
    function closeMenu() {
      menuOpen = false;
      document.getElementById('mobile-menu').classList.remove('open');
      document.getElementById('hamburger').classList.remove('active');
      document.body.classList.remove('no-scroll');
    }
    /* Close menu on outside click */
    document.addEventListener('click', e => {
      if (menuOpen && !document.getElementById('nav').contains(e.target)) closeMenu();
    });

    /* ── Article modal ── */
    function openArticle(id) {
      const a  = C.articles.find(x => x.id === id);
      const d  = a[lang];
      const LS = C[lang];
      set('modal-date',  d.date);
      set('modal-title', d.title);
      html('modal-content', d.content);
      set('modal-close-text', LS.articles_section.close);
      const dlg = document.getElementById('article-modal');
      dlg.scrollTop = 0;
      dlg.showModal();
    }
    function closeModal() { document.getElementById('article-modal').close(); }
    document.getElementById('article-modal').addEventListener('click', e => {
      const r = e.currentTarget.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right ||
          e.clientY < r.top  || e.clientY > r.bottom) closeModal();
    });

    /* ── IntersectionObserver ── */
    let observer;
    function setupObserver() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver(
        entries => entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
        }),
        { threshold: 0.1 }
      );
      document.querySelectorAll('.reveal').forEach(el => {
        el.classList.remove('visible');
        observer.observe(el);
      });
    }

    /* ── DOM helpers ── */
    function set(id, txt)      { const el = document.getElementById(id); if (el) el.textContent = txt; }
    function html(id, markup)  { const el = document.getElementById(id); if (el) el.innerHTML  = markup; }
    function attr(id, k, v)    { const el = document.getElementById(id); if (el) el.setAttribute(k, v); }

    /* ── SVG icons ── */
    function waIcon() {
      return `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="flex-shrink:0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
    }
    function emailIcon() {
      return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
    }
    function waLink(msg) { return 'https://wa.me/' + WA + '?text=' + encodeURIComponent(msg); }

    init();
  </script>
</body>
</html>
